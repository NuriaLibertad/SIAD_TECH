<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="password-card">
            
            <div class="card-header">
                <button class="back-button">
                    <i class="fas fa-arrow-left"></i>
                    Voltar
                </button>
                <h1>Redefinir Senha</h1>
            </div>

            <form id="resetPasswordForm">
                
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="newPassword" placeholder="Nova senha*" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePasswordVisibility('newPassword', this)"></i>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirmar a nova senha*" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)"></i>
                </div>

                <p class="required-note">*Campos obrigatórios</p>

                <button type="submit" class="submit-button">
                    Alterar
                    <i class="fas fa-arrow-right"></i>
                </button>

            </form>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
